# fly.toml — Fly.io config for Dead Giveaway
# See https://fly.io/docs/reference/configuration/

app = "dead-giveaway-game"
primary_region = "iad"

[build]

[deploy]
  release_command = "/app/bin/migrate"

[env]
  PHX_HOST = "dead-giveaway-game.fly.dev"
  PORT = "8080"
  ECTO_IPV6 = "true"
  DNS_CLUSTER_QUERY = "dead-giveaway-game.internal"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
